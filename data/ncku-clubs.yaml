- id: ncku-112b095
  platform_id: 112B095
  name: 文化資產尋旅社
  name_en: Cultural Legacy Exploration Club
  category: 綜合性
  category_code: B
  status: 正式
  email: 112b095@gs.ncku.edu.tw
  president_name: 鄭秉杰
  president_name_en: null
  advisor_name: 楊中平
  goal: 文化資產尋旅社堅持人文精神，致力於透過深入研究和保存文化遺產，促進對歷史、文化和社會的全面理解與尊重。社團同時倡導與生態環境的和諧共生，確保文化資產的探索與利用過程中，尊重自然，促進可持續發展和環境保護。著重於保存和維護有形與無形文化資產，經由文本的反思，推動其持續發展與傳承，實現大學社會責任之學生實踐，並為歷史文化的多樣性和發展做出貢獻。
  description: '文化資產尋旅社（簡稱文資社）之中心主旨為對於文化遺產的深入探索與推廣保存，以擁有四百年歷史的臺南為軸心，探尋地方多彩面貌，期許引發學生及關係人對於文化資產的重視與熱情，同時立足成大，放眼世界，促進多元文化的交流與理解。


    國立成功大學位於台南，這座城市是臺灣最早開發的地區之一，擁有深厚的歷史文化底蘊，而成功大學本身也是這片土地上的重要文化資產。在這個歷史悠久的學術環境中，來自全台各地的學子彙聚於此，但他們對於所處的台南乃至整個臺灣的深入瞭解和探索卻可能有所不足。在這前提之下，文化資產尋旅社的成立，旨在激發成大學生對所在城市、文化和歷史的興趣，進而拓展其視野，不僅深入認識台南，更進一步理解和探索整個臺灣的豐富文化和歷史，促使學生們成為連接臺灣歷史文化與現代社會的橋樑。


    藉由社團的凝聚力，文資社將成為一個保存與傳承文化資產的平臺，讓學生走出教室，親自走訪和實地感受，深入瞭解有形和無形文化資產的獨特之處，並建立對這片土地的情感聯繫，共同創造屬於自己的臺南記憶符號。'
