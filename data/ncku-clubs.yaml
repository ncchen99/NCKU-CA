  name: 游泳社
  name_en: Aquatic Sports Club
  category: 體能性
  category_code: E
  status: 正式
  email: aquatic.club@gs.ncku.edu.tw
  president_name: null
  president_name_en: null
  advisor_name: null
  goal: 讓大家學會游泳，愛上游泳，並且安全的游泳
  description: '成大游泳社是一群愛好游泳的學生，於課餘相約一起去玩水的體育性社團。游泳是一種全身性、對身體零負擔的運動，沒有籃球、足球容易造成的運動傷害，和這類劇烈運動過後的疲勞，還可以增強體能、增進免疫能力，且藉此塑造優美的體態。游泳還有很多附加優點，在夏天下水，不旦可以蛻去一身的煩躁，又可「清涼一夏」。不小心溺水時，如果識水性的話，也不會因為慌張而不知所措。

    目前本社活動地點於新館游泳池，每週一次，希望能使初學者在輕鬆的環境下學習游泳，在學期末驗收成果。泳池旁提供水療、三溫暖等，希望能提供社員游泳之外的樂趣。

    社團除了運動，尚有眾多活動（泳渡日月潭、活水湖長泳、外木山長泳）、慶生會，聯誼等活動增進社員之間的情感，希望讓同學在求學之餘，能有調劑身心的機會。『健康的身體，是一切活動的本錢』，竭誠歡迎同學們加入我們的行列。'
  regular_activity_time: 星期二晚上7:00-8:00
  main_activity_location: 新館游泳池
