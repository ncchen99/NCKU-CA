    \    我們社團屬於服務性質的社團，規模小型，無定期活動時間，但每學期會有兩次家服務、兩次小貝殼、期末營隊以及一些社團內活動，家服務是由分隊長決定服務內容，每學期都不太一樣，比如去老人院帶活動、流浪狗之家幫狗洗澡等等，透過不同地點可以讓社員接觸到不同的事物，思考甚麼是服務；小貝殼則是帶自閉症個案一天，從高功能到低功能都有，主要就是帶簡單的活動，讓個案的照顧者能稍微休息外，也讓個案有新的刺激；最後是期末營隊，為期五天，我們會去偏遠地區的國小辦營隊，帶課輔、遊戲、表演。\n\
    \    總而言之我們社團最主要的活動是以上三個，另外還有教導服務觀的課程，討論和服務相關事情，時而會一起出去玩，藉此增加社員的感情。"
