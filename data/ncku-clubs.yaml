  description: 成大鋼琴社是個由一群熱愛鋼琴的同學所組成，在這裡可以遇見很多不同類型的人，有從未讀過音樂班卻獎項拿滿的同學，也有會自己寫曲編曲演奏的同學，或是情傷滿滿喜歡每天泡在全黑琴房的同學，每個都很熱愛音樂也很厲害，是個人才濟濟的社團。彈奏曲風也很多元有古典、爵士、現代樂、四手聯彈、雙鋼琴等。成大鋼琴社每年皆會舉辦各式各樣活動，以促進社團社員之情誼、增加鋼琴演奏不同曲風及演奏方式的交流機會，活動涵蓋多項精彩的學術性與娛樂性活動，如：古典音樂社課、大師班授課、下午茶音樂會、冬季音樂會、夏季音樂會、社野餐、與音樂小屋等。
