  description: '成大爵士音樂社成立於2011年秋天，集結了來自校園以及社會的爵士樂愛好者，不論年紀大小，不論手持甚麼樂器，期冀所有音樂同好都能在此交流學習爵士的心得，並定期舉辦jam!


    成大爵士樂社的活動大小不一，不僅每星期都會在固定地點進行合奏社課與分部課如音樂賞析、樂理與即興、各樂器研討等，更會不定期舉辦音樂講座、到校外現場觀摩爵士樂手表演、與成大其他社團合作舉行小型表演，並在每學期期末舉辦成果發表會。


    藍調、Swing、Funk、巴莎諾瓦是我們致力於重現的經典曲風，同時我們也不斷嘗試新風格，在本土歌曲與各類型來自外國的音樂加入爵士樂的元素，希望能以最輕鬆簡單的方式讓大家享受爵士、愛上爵士。'
