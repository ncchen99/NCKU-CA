  description: '法輪大法（又稱法輪功）是由李洪志先生創編的佛家上乘修煉大法，同化 「真、善、忍」，按照宇宙演化原理而修煉，修的是大法大道。

    法輪大法與其他氣功最大的不同點在於，它是一套完整的性命雙修的修煉方法。修性即修煉心性，是長功的關鍵，而修煉過程就是不斷的去人的執著心的過程。修命的部分即煉動作。總共五套功法，既修又煉。

    法輪大法圓融明慧，動作簡練，大道至簡至易。'
