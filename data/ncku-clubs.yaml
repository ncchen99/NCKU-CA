- id: ncku-088f004
  platform_id: 088F004
  name: 成大服務團
  name_en: NCKU Students Service Club
  category: 服務性
  category_code: F
  status: 正式
  email: 101thnckuserviceclub@gmail.com
  president_name: 蔡承瑋
  president_name_en: null
  advisor_name: 江明修
  goal: 人生以服務為目的
  description: "本團前身係成大最早之學生服務性社團悠悠社，該社係以UP UTILITY為名，初期以提供成大同學正當娛樂為主體。後來漸次擴大，有校內服務，慈幼等組。\n\
    \ \n民國六十年七月，本校改製為國立成功大學。民國六十一年悠悠社因故解散，次年（民國六十二年）由悠悠社社員劉中堅等人籌劃，擇原悠悠社部份活動項目成立本團。\n\
    \ \n創團之初，在「耶穌受難紀念地」橄欖山聚會，決定本團宗旨──奉行「人生以服務為目的」，發揚服務道德心，經由社團活動，培養青年對國家社會之責任及義務感。會中並擬定本團之章程、組織及活動方針。\n\
    \ \n本團草創之初，即有三百多位團員踴躍報名參加，始分文教、資料、工作、公關四組。\n \n新生服務隊為本團第一個活動，繼之以「一滴鮮血萬縷情」壯舉，獲全校同學熱烈迴響，本團之性質及精神，乃為同學普遍所認同，因此，雖屢感財力物力之缺乏，並為流離不定之辦公地點所困擾，然在歷屆團長和幹部精心擘劃與經營之下，組織、活動則漸具規模和雛型。\n\
    \ \n其中較重要而影響深遠之沿革、變革如下：\n \n六十二學年度第一學期：\n成大服務團成立，擬定章程，立刻展開新生服務、捐血運動「一滴鮮血萬縷情」和東區仁愛工作隊（針對貧戶學童的課業輔導）等服務工作"
  regular_activity_time: 平日晚上、週末全天
  main_activity_location: 雲平大樓前廣場，一活會議室
  website_url: http://www.facebook.com/ServiceClub.NCKU
  import_source: yaml_import
  raw_data:
    list_row:
      row_no: '1'
      name_c: 成大服務團
      name_e: NCKU Students Service Club
      status: 正式
      platform_id: 088F004
    detail:
