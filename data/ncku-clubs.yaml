  goal: 促進合唱藝術之交流，推廣合唱音樂之美善。
  description: '成大合唱團成立於省立工學院時代，初以「晨鐘」為名。西元1956年，因本校改制為成功大學，乃正式更名為成大合唱團。


    自初創至今已逾甲子，成大合唱團在歷任老師的指導與幹部、團員們的努力經營下不斷茁壯，非但感情更加凝聚，藝術品質亦越發精緻。


    成大合唱團戮力於將音樂的種子散播至校內各角落，以歌聲會友，每年除舉辦定期音樂會，亦積極向外拓展，與各方喜愛藝術之團體合作，推動在地藝文風氣，也拓展團員音樂視野。我們的團部位於光復校區一活5F，在那，我們相互交流音樂想法、共享和聲之美，也舉辦各項活動，讓團員更具向心力，口唱心亦和。


    近年來，隨著老師們的帶領，我們不論在古典與現代、東方與西方、宗教與世俗、方言與在地歌謠作品皆有涉略，期許成大合唱團未來能持續以多元與包容的態度來分享合唱音樂之美。'
  regular_activity_time: 每週一、四 19:00~21:30
  main_activity_location: 團部
  website_url: http://fb.me/chorus.ncku
