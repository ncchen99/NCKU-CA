  description: '【生活討論社，沒有忘記你的實體社群】


    「虛擬社群待久了，希望大家沒有忘記實體社群。」


    哈囉大家！我們是生活討論社，一個全新的社團


    專注「只有對話」的活動！希望透過討論生活經驗和對這些經驗的看法形成一個實體社群。沒有固定社課，能來就來。不用任何準備，人來就好～


    ｜什麼樣的人適合加入我們？

    Reflect：生活觀察家，對自己的生活經驗很有想法和看法

    Exchange：平時系上可能較少有表達個人意見的機會，想藉社團交流意見

    Connect：想接觸更多元領域、背景和經驗的人'
