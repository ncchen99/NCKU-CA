    二、多元表演機會：學期間將舉辦紅白賽、街頭藝人體驗、期末成果發表會等活動\n三、各式團體活動：學期中將舉辦桌遊社聚、KTV社聚、期末聚餐增進社員感情\n\n\
    【社團常見問答】\n問：我都沒有唱歌基礎，我可以參加流唱社嗎？\n答：只要喜歡唱歌、有想要增強實力的心，都歡迎加入流唱！如果課後有問題也可以詢問社師或是教學ㄛ~\n\
    \n問：什麼是紅白賽？\n答：紅白賽的參賽者會分成紅、白2隊，每隊一次派出1名成員進行1對1歌唱競賽，獲勝方可得1分，最終分數高的隊伍獲勝，可以獲得精美禮品。\n\
    \n問：社師課老師會教什麼？\n答：每學期大約有5~6堂的社師課。老師會講授說話心態、肌肉訓練、轉音練習、假音練習、抖音練習、舞台情感表現等內容。最重要的是，社師還會在學期中帶社員在校園內進行街頭藝人的表演，增加大家的舞台表演機會！"
