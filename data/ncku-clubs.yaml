  goal: 成大資料分析社 (NCKU Data Analytics Club) 致力於讓不同科系背景的同學們能因「資料分析」而拓展職涯的寬度，創造自己未來更多的可能性。
  description: '成大資料分析社 (NCKU Data Analytics Club) 是由一群對資料分析有興趣，且具強烈學習成長意願的跨學院成大學生所組成的社團。致力於讓不同科系背景的同學們能因「資料分析」而拓展職涯的寬度,創造自己未來更多的可能性。

    透過社課、工作坊和職涯分享等課程，培養社員具備資料分析的專業能力，並藉由企業實作專案，磨練與不同領域的社員們團隊合作的經驗。

    社課與工作坊以資料分析流程為主軸，並佐以商業思維的培養。例如資料視覺化、模型預測、商業問題解決方法論和商業簡報法等課程，程式語言將涵蓋excel、python和SQL等。企業實作專案則期許社員能應用所學，以年輕世代的視角提供給企業商業問題的解決方案，藉此磨練溝通合作與解決問題能力，並創造產學合作的價值。'
  regular_activity_time: 週六 10:00-17:00
