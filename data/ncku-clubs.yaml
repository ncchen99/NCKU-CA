  description: '三十三年前，有幸於現今柳營奇美曹朝榮院長四處奔波尋求資源，成大醫療服務隊終於成立。早期出去的工作最重要都是以衛教為主，例如：義診、高血壓、糖尿病配合上防癌列車的防癌推展，慢慢的才把規模擴大，進而出現了國中以及國小的衛教成長營。

    　　目前醫療服務隊的活動以一年為一個循環，分別會進行國中小出隊、家訪、晚會、星星兒等大型衛教活動，再佐以一些小型的志工體驗日，如：文華精神之家拜訪等等，希望能利用大學生們的熱情，回饋社會上需要關懷的族群。'
