  description: "本社團主要有「兒童讀經班帶讀&出隊」、「通識認證演講」、「寒暑期教育志工營隊」等活動。在每周五定期至社區讀經班出隊帶小朋友，寓教於樂提升小朋友品格能力。學期初也會參加各校聯合的環保淨灘活動，並有志工聯誼、社團出遊、古蹟趴趴Go、跨年環保志工等有趣活動。另外，也會定期舉辦淨化人心的講座(心靈成長營)，使志工夥伴的心靈能得到更多的提升，激發出更多的潛能。本社致力於蔬食環保愛地球的推廣，提供成大附近素食地圖，希望讓更多人瞭解到素食的好處。知恩、感恩、樂觀進取的態度是我們崇青不忘的精神，崇德青年社歡迎您的加入。\n\
    \nThe major activities are as follows:\n1.“Sutra reading for children ”  (Every\
    \ Friday)\n2.“General Education speech” \n3.\"Character education camp.“ \n4.Others:\
