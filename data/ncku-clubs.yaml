  description: 文雲武術社以內家拳為主，內家拳包含了形意拳、八卦掌、螳螂、八極等武藝為主，其中螳螂拳更包含六合螳螂、七星螳螂、八步螳螂等螳螂拳分支，旁及太極、迷蹤、劈掛、太祖長拳等各門武藝，並結合刀、槍、劍、棍、奇兵(雙鉞、雙鉤等)與大槍等兵器的訓練學習，期許以各門派武術結合，綜合鍛鍊成大學生的體魄。與其他武術性社團的差異如下，國術社是以螳螂拳為主，八極拳社當然是以八極拳為主，太極拳社當然是以太極拳為主，至於我們文雲武術社是一個綜合與融合性的新型武術性社團，所以在社團名稱的命名上不以單一拳術命名。在社團教學上會以形意拳和八卦掌為主，其中形意拳為我們社團獨有的。我們社團的形意拳由楊富堯教練指導，其傳承如下，李存義-陳泮嶺-陳金寶-楊富堯教練。我們的八卦掌由陳盈太教練指導，是以宮式八卦掌為主，傳承自祖師爺董海川，其傳承如下，董海川-尹福-宮寶田-劉雲樵-陳盈太教練-蔡明育教練及蔡佩青教練。
