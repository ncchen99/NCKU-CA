- id: ncku-100g025
  platform_id: 100G025
  name: 原住民文化交流社
  name_en: Taiwan Indigenous Club
  category: 聯誼性
  category_code: G
  status: 正式
  email: ssssean.work@gmail.com
  president_name: 郭智翔
  president_name_en: null
  advisor_name: 王毓正
  goal: '我們跳舞、我們唱歌，認識文化，一起尋根。

    更重要的是，關心部落、關心台灣，

    要用原住民青年的觀點說出心裡的話、用原住民青年的力量改變世界。'
  description: '歡迎加入國立成功大學原住民文化交流社:

    這是一個充滿活力的社群，致力於學習和了解台灣原住民族的豐富文化遺產。我們的社團是一個文化交流、教育和倡導的平台，旨在加深對台灣多元原住民族文化的理解，這些文化構成了台灣身份的重要部分。


    我們的使命：

    在台灣原住民族社團，我們致力於：

    文化學習： 學習台灣原住民族社群的傳統知識、語言和習俗。我們努力讓這些寶貴的文化瑰寶得以傳承，讓未來世代也能接觸與了解。

    教育與認識： 提供學習機會，了解台灣原住民族的歷史、文化及當代議題。我們相信知識是促進尊重與欣賞的關鍵。

    社群參與： 創造一個歡迎各界人士參與並學習原住民族文化的空間。透過工作坊、活動及合作，我們致力於在不同社群間建立橋樑。

    倡導與賦權： 支持原住民族權益並倡導社會正義。我們鼓勵成員對重要議題採取行動，放大原住民族的聲音及其對社會的貢獻。

    加入我們：

    無論您是希望與自己文化根源建立聯繫的原住民族成員，還是對了解台灣多元文化感興趣的人士，原住民文化交流社都歡迎您的加入。讓我們一起了解台灣原住民族的過去、現在與未來，並建立一個尊重與榮耀其無價貢獻的社群。'
  regular_activity_time: 星期二晚上六點半
