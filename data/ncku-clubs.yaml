  description: "彰友會——由來自彰化的莘莘學子組合而成的聯誼性社團——其成員多半為從彰化遠赴至台南讀書的菁英。\n        結束高中生活後，一群人便隨著時間的推進，隻身來到這頂著一顆豔陽的台南。接著，踏上了這名為「大學」的旅程。彰友會的成立宗旨便是希望透過學期初的迎新，學期間的出遊、傳情，以及學期末的尾牙，來凝聚及維持「同鄉人」的感情。同時，也拓展大家在成功大學的人脈，找到一群志同道合的夥伴們，更期許能在社團活動中培養每個人的表演、社交等正規課程無法教授卻不可或缺的能力。"
