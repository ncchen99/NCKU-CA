  name: 戲邊劇團
  name_en: Out of Rules
  category: 康樂性
  category_code: D
  status: 正式
  email: oortheatre.club@gs.ncku.edu.tw
  president_name: 鍾辰伶
  president_name_en: null
  advisor_name: null
  goal: 面劇團從藝術中心指導團隊轉型成為學校社團，並以全新的名稱-戲邊劇團重新出發，我們以此名稱期望自己不被框架束縛，期望自己挑戰跳脫戲劇框架，挑戰戲劇常規。
  description: '在充滿文化氣息的古都臺南，貳零壹零年，來自各系所熱愛戲劇的成大學生在因緣巧合之下組成了成大面劇團。成大面劇團為藝術中心扶持的學生劇團，我們嘗試戲劇，在戲劇中體驗生活。Face
